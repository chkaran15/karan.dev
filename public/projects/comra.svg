<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Comra 3D visualization scene</title>
  <desc id="desc">A dark 3D visualization environment with luminous violet geometry and premium gold measurement lines.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#05050f"/>
      <stop offset="0.5" stop-color="#0d1028"/>
      <stop offset="1" stop-color="#171337"/>
    </linearGradient>
    <linearGradient id="faceA" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="faceB" x1="0" x2="1" y1="1" y2="0">
      <stop offset="0" stop-color="#252545"/>
